punctuator:
    import_preset: custom_symbols

editor:
    bindings:
        Escape: commit_script_text

key_binder:
    import_preset: default
    bindings:
        - { when: paging, accept: comma, send: comma }
        - { when: has_menu, accept: period, send: period }
        - { when: always, accept: KP_Add, send: "L" }
        - { when: always, accept: KP_Subtract, send: "U" }
        - { when: always, accept: KP_Multiply, send: "C" }
        - { when: always, accept: KP_Divide, send: "M" }

recognizer:
    import_preset: default
    __patch:
        patterns/punct: '^\^([0-9]0?|[A-Za-z]+)$|^[A-Z]+$'
