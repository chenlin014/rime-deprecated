# Rime schema
# encoding: utf-8

schema:
    schema_id: niba_teiba
    name: 二碼鄭碼
    version: 'v0.1'
    author:
        - 鄭碼發明人 郑易里教授
        - ensigma96 <ensigma96@gmail.com>

switches:
    - name: ascii_mode
      reset: 0
      states: [ 日, 西 ]
    - name: full_shape
      states: [ 半角, 全角 ]
    - name: ascii_punct
      states: [ 。，, ．， ]

engine:
    processors:
        - ascii_composer
        - recognizer
        - key_binder
        - speller
        - punctuator
        - selector
        - navigator
        - express_editor
    segmentors:
        - ascii_segmentor
        - matcher
        - abc_segmentor
        - punct_segmentor
        - fallback_segmentor
    translators:
        - punct_translator
        - table_translator
    filters:
        - uniquifier

speller:
    alphabet: "zyxwvutsrqponmlkjihgfedcbaLUCM"
    delimiter: " '"
    max_code_length: 100
    auto_select: false
    auto_select_unique_candidate: false

