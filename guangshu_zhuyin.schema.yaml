# Rime schema
# encoding: utf-8

schema:
  schema_id: guangshu_zhuyin
  name: 广书注音
  version: '0.1'
  author:
    - 陈林

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: 'zvklugpjsroedhaintxwfcmybqZVKLUGPJSROEDHAINTXWFCMYBQ+-*/0123456789'
  delimiter: " '"
  max_code_length: 100
  auto_select: false
  auto_select_unique_candidate: false
  algebra:
    - abbrev/^([a-zA-Z0-9]).+$/$1/

translator:
  dictionary: guangshu_zhuyin
  enable_user_dict: false
  preedit_format:
    - "xform/ //"
    - "xlit|zvklBDugpjsroedhaintxwfcGHmybqZVKLIJSOEAFC|ㄅㄐㄉㄓㄍㄩㄢㄠㄛㄣˋˇˊˉ˙ㄞㄧㄨㄜㄥㄈㄒㄗㄕㄏㄟㄚㄡㄝㄤㄆㄑㄊㄔㄎㄋㄇㄌㄖㄦㄘㄙ|"
  comment_format:
    - "xlit|zvklBDugpjsroedhaintxwfcGHmybqZVKLIJSOEAFC~|ㄅㄐㄉㄓㄍㄩㄢㄠㄛㄣˋˇˊˉ˙ㄞㄧㄨㄜㄥㄈㄒㄗㄕㄏㄟㄚㄡㄝㄤㄆㄑㄊㄔㄎㄋㄇㄌㄖㄦㄘㄙ～|"

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: comma, send: comma }      # ㄝ
    - { when: has_menu, accept: period, send: period }    # ㄡ
    - { when: has_menu, accept: minus, send: minus }      # ㄦ
    - { when: paging, accept: minus, send: Page_Up }
    - { when: always, accept: KP_Add, send: "B" }
    - { when: always, accept: KP_Subtract, send: "D" }
    - { when: always, accept: KP_Multiply, send: "G" }
    - { when: always, accept: KP_Divide, send: "H" }
    - { when: always, accept: Shift+KP_Add, send: "I" }

editor:
  bindings:
    Escape: commit_script_text

recognizer:
  import_preset: default
